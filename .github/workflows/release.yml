name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Registry artifact version without leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: package
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Build tagged registry artifact
        id: package
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Release version is empty." }
          if ($version -match '-beta' -and $version -notmatch '^\d{4}\.\d+\.\d+\.\d+-beta$') {
            throw "Beta versions must use YYYY.M.D.N-beta."
          }

          .\build.ps1 -Version $version

          $releaseDir = "release"
          if (Test-Path -LiteralPath $releaseDir) { Remove-Item -Recurse -Force -LiteralPath $releaseDir }
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $stage = Join-Path $releaseDir "wkopenvr-module-registry-v$version"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse -Path "v1" -Destination (Join-Path $stage "v1")
          Copy-Item -Path "_headers", "_redirects" -Destination $stage

          $zip = Join-Path $releaseDir "wkopenvr-module-registry-v$version.zip"
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zip -Force
          $hash = (Get-FileHash -LiteralPath $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "Registry artifact: $zip sha256=$hash"

          $notes = @(
            "WKOpenVR native module registry snapshot.",
            "",
            "Checksums:",
            "$(Split-Path -Leaf $zip) sha256=$hash"
          ) -join "`n"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          [System.IO.File]::WriteAllText($notesPath, $notes, (New-Object System.Text.UTF8Encoding($false)))
          $isBeta = $version -match '-beta$'
          $tag = $env:TAG_NAME
          if ($env:REF_TYPE -ne "tag") {
            $tag = "v$version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "is_beta=$($isBeta.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Upload registry artifact
        uses: actions/upload-artifact@v7
        with:
          name: wkopenvr-module-registry-${{ github.ref_name }}
          path: release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
          IS_BETA: ${{ steps.package.outputs.is_beta }}
          NOTES_PATH: ${{ steps.package.outputs.notes_path }}
        run: |
          $assets = @(Get-ChildItem -Path "release" -Filter "*.zip" | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) { throw "No release assets found." }

          $extra = @()
          if ($env:IS_BETA -eq "true") { $extra = @("--prerelease", "--latest=false") }

          gh release create $env:TAG_NAME --title $env:TAG_NAME --notes-file $env:NOTES_PATH @extra @assets
