name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate registry
        shell: pwsh
        run: .\build.ps1

      - name: Run tests
        shell: pwsh
        run: .\test.ps1

      - name: Run lint
        shell: pwsh
        run: .\lint.ps1
